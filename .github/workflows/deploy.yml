name: Deploy to VPS (Docker)

on:
  push:
    branches: ['main']
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set image names
        run: |
          REPO_LC=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "APP_IMAGE=ghcr.io/${REPO_LC}/app" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=sha-${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image (bot/api)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.APP_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set image names
        run: |
          REPO_LC=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "APP_IMAGE=ghcr.io/${REPO_LC}/app" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=sha-${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy.pem
          chmod 600 ~/.ssh/id_deploy.pem

      - name: Upload compose files
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_deploy.pem "${SSH_USER}@${SSH_HOST}" "mkdir -p '${APP_DIR}'"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_deploy.pem docker-compose.yml "${SSH_USER}@${SSH_HOST}:${APP_DIR}/docker-compose.yml"

      - name: Deploy on VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          APP_IMAGE: ${{ env.APP_IMAGE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail
          GHCR_TOKEN_B64=$(printf '%s' "${GHCR_TOKEN}" | base64 | tr -d '\n')

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_deploy.pem "${SSH_USER}@${SSH_HOST}" <<EOF
            set -euo pipefail

            APP_DIR="${APP_DIR}"
            cd "\$APP_DIR"

            # Support both "docker" (user in docker group) and "sudo docker".
            if docker info >/dev/null 2>&1; then
              DOCKER_CMD="docker"
            elif sudo -n docker info >/dev/null 2>&1; then
              DOCKER_CMD="sudo -n docker"
            else
              echo "Docker access denied for user \$(whoami). Add user to docker group or allow passwordless sudo for docker."
              exit 1
            fi

            mkdir -p .runtime/bot
            mkdir -p backups/bot-storage

            if [ ! -f ".env.production" ]; then
              echo "Missing .env.production in \$APP_DIR. Create it before deploy."
              exit 1
            fi

            STORAGE_FILE=".runtime/bot/storage.json"
            if [ -f "\$STORAGE_FILE" ]; then
              cp "\$STORAGE_FILE" "backups/bot-storage/storage-\$(date +%Y%m%d-%H%M%S).json"
            fi

            if command -v pm2 >/dev/null 2>&1; then
              pm2 describe chiateam >/dev/null 2>&1 && pm2 stop chiateam || true
              pm2 describe chiateam >/dev/null 2>&1 && pm2 delete chiateam || true
            fi

            printf '%s' "${GHCR_TOKEN_B64}" | base64 -d | \$DOCKER_CMD login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            printf '%s\n' "APP_IMAGE=${APP_IMAGE}:${IMAGE_TAG}" > .env.deploy

            \$DOCKER_CMD compose --env-file .env.deploy pull
            \$DOCKER_CMD compose --env-file .env.deploy up -d --remove-orphans --no-build

            curl -fsS http://127.0.0.1:8787/healthz >/dev/null
          EOF
